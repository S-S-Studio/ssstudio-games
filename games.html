<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games - S&amp;S Studio</title>
  <meta name="description" content="Browse Android games from S&amp;S Studio." />

  <style>
    :root {
      --page-bg: #0B1020;
      --deep-bg: #080C18;
      --card-bg: #151E33;
      --card-bg-2: #10182B;
      --border: #26324D;
      --soft-border: rgba(148, 163, 184, 0.18);
      --text: #F4F7FB;
      --text-secondary: #AEB8CC;
      --text-muted: #7E8AA5;
      --accent: #38BDF8;
      --purple: #8B5CF6;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      --radius-card: 24px;
      --radius-button: 15px;
      --container: 940px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.15), transparent 36%),
        var(--page-bg);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: inherit; }

    a:focus-visible,
    button:focus-visible {
      outline: 3px solid rgba(56, 189, 248, 0.75);
      outline-offset: 4px;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      height: 68px;
      background: rgba(11, 16, 32, 0.86);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    }

    .header-inner {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 20px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      position: relative;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-weight: 850;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .brand-mark {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      box-shadow: 0 0 22px rgba(56, 189, 248, 0.65);
      transform: rotate(12deg);
      flex: 0 0 auto;
    }

    .desktop-nav {
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--text-secondary);
      font-weight: 700;
      font-size: 14px;
    }

    .desktop-nav a,
    .mobile-home,
    .mobile-menu a { text-decoration: none; }

    .desktop-nav a:hover,
    .mobile-home:hover,
    .mobile-menu a:hover { color: var(--text); }

    .mobile-nav {
      display: none;
      align-items: center;
      gap: 18px;
      color: var(--text-secondary);
      font-weight: 750;
      font-size: 14px;
    }

    .menu-button {
      border: 0;
      background: transparent;
      color: var(--text-secondary);
      font: inherit;
      font-size: 26px;
      line-height: 1;
      padding: 4px 0 4px 8px;
      cursor: pointer;
    }

    .menu-button:hover { color: var(--text); }

    .mobile-menu {
      display: none;
      position: absolute;
      right: 18px;
      top: 60px;
      min-width: 170px;
      background: rgba(11, 16, 32, 0.98);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 10px;
    }

    .mobile-menu.open { display: grid; }

    .mobile-menu a {
      padding: 11px 12px;
      color: var(--text-secondary);
      font-weight: 750;
    }

    main {
      flex: 1;
    }

    .container {
      max-width: var(--container);
      margin: 0 auto;
      padding: 0 20px;
    }

    .page-head {
      padding: 46px 0 22px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 800;
      line-height: 1;
    }

    .back-link:hover {
      color: var(--text);
    }

    .page-head h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 7vw, 54px);
      line-height: 1.05;
      letter-spacing: -1px;
    }

    .page-head p {
      margin: 0;
      max-width: 660px;
      color: var(--text-secondary);
      font-size: 17px;
    }

    .hub-list {
      display: grid;
      gap: 14px;
      padding: 18px 0 46px;
    }

    .game-row {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 22px;
      background:
        linear-gradient(120deg, rgba(56,189,248,0.08), rgba(139,92,246,0.08)),
        var(--card-bg);
      box-shadow: 0 16px 45px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .row-main {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 14px;
      cursor: pointer;
    }

    .row-main:hover .game-title { color: #ffffff; }

    .game-icon {
      width: 76px;
      height: 76px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, rgba(56,189,248,0.18), rgba(139,92,246,0.18));
      border: 1px solid rgba(148, 163, 184, 0.16);
      color: #DDFBFF;
      font-weight: 900;
      font-size: 18px;
      text-align: center;
      line-height: 1.1;
      overflow: hidden;
    }

    .game-title {
      margin: 0;
      font-size: 21px;
      line-height: 1.18;
      transition: color 160ms ease;
    }

    .game-short {
      margin: 4px 0 0;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.35;
    }

    .expand-button {
      min-width: 46px;
      min-height: 46px;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      display: grid;
      place-items: center;
      appearance: none;
      -webkit-appearance: none;
    }

    .expand-button:hover { color: var(--text); }

    .chevron-icon {
      width: 36px;
      height: 30px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transform-origin: center;
    }

    .chevron-icon.up {
      transform: rotate(180deg);
    }

    .chevron-icon.back {
      width: 28px;
      height: 28px;
      stroke-width: 3.2;
      transform: rotate(90deg);
    }

    .row-more {
      display: none;
      padding: 0 14px 16px 104px;
      color: var(--text-secondary);
    }

    .game-row.expanded .row-more { display: block; }

    .row-meta {
      margin-bottom: 7px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 800;
    }

    .row-meta .genre { color: #A5F3FC; }
    .row-meta .status { color: #DDD6FE; }

    .row-more p {
      margin: 0;
      max-width: 620px;
      font-size: 14px;
      line-height: 1.45;
    }

    .row-note {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 700;
    }

    .site-footer {
      margin-top: auto;
      background: transparent;
      border-top: 0;
      color: var(--text-muted);
    }

    .footer-inner {
      max-width: 300px;
      margin: 0 auto;
      padding: 14px 20px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 13px;
      line-height: 1.35;
      text-align: center;
    }

    .footer-contact {
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.45;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }

    @media (max-width: 640px) {
      .site-header { height: 64px; }
      .header-inner { padding: 0 18px; }
      .desktop-nav { display: none; }
      .mobile-nav { display: flex; }
      .container { padding: 0 18px; }
      .page-head { padding: 28px 0 16px; }
      .back-link { margin-bottom: 14px; font-size: 15px; }
      .page-head h1 { font-size: 36px; }
      .page-head p { font-size: 16px; line-height: 1.55; }
      .hub-list { gap: 12px; padding-top: 16px; }
      .game-row { border-radius: 20px; }
      .row-main { grid-template-columns: 64px minmax(0, 1fr) 38px; gap: 12px; padding: 12px; }
      .game-icon { width: 64px; height: 64px; border-radius: 16px; font-size: 15px; }
      .game-title { font-size: 19px; }
      .game-short { font-size: 13px; }
      .expand-button { min-width: 44px; min-height: 44px; }
      .chevron-icon { width: 34px; height: 28px; }
      .row-more { padding: 0 12px 14px 88px; }
      .footer-inner { max-width: 280px; padding-bottom: 20px; }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" id="brandLink" href="index.html" aria-label="S&S Studio home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>S&amp;S Studio</span>
      </a>

      <nav class="desktop-nav" aria-label="Main navigation">
        <a id="navHome" href="index.html">Home</a>
        <a id="navGames" href="games.html">Games</a>
        <a id="navAbout" href="index.html#about">About us</a>
        <a id="navContact" href="#contact">Contact</a>
      </nav>

      <nav class="mobile-nav" aria-label="Mobile navigation">
        <a class="mobile-home" id="mobileHome" href="index.html">Home</a>
        <button class="menu-button" id="menuButton" type="button" aria-label="Open menu" aria-expanded="false">☰</button>
        <div class="mobile-menu" id="mobileMenu">
          <a id="mobileGames" href="games.html">Games</a>
          <a id="mobileAbout" href="index.html#aboutMobile">About us</a>
          <a href="#contact">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-head">
      <div class="container">
        <a class="back-link" id="backToHome" href="index.html" aria-label="Back to home"><svg class="chevron-icon back" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 8.5L12 15.5L19 8.5"></path></svg><span>Home</span></a>
        <h1>Games</h1>
        <p>Choose a game. Tap the row to open its page, or use the arrow to show a little more detail first.</p>
      </div>
    </section>

    <section class="container" aria-label="Game list">
      <div class="hub-list" id="hubList"></div>
    </section>
  </main>

  <footer class="site-footer" id="contact">
    <div class="footer-inner">
      <div class="footer-contact">Contact: ssgamestudiomail@gmail.com</div>
      <div>© 2026 S&amp;S Studio</div>
    </div>
  </footer>

  <script>
    const feedbackUrl = "https://script.google.com/macros/s/AKfycbx-gKRLXGlwSCIi0dkzVSFX-Z6tAc5lcwOO4lYgAGhvA5aaloLud3He9ZnJM9fMpgVG-A/exec";

    const games = [
      {
        id: "memory-match",
        title: "Memory Match",
        tinyDescription: "Match cards",
        shortDescription: "Match cards, train your memory, and complete levels with fewer moves.",
        genre: "Puzzle",
        status: "Available",
        imageText: "MM"
      },
      {
        id: "block-runner",
        title: "Block Runner",
        tinyDescription: "Dodge obstacles",
        shortDescription: "Dodge obstacles and chase a better run in quick mobile sessions.",
        genre: "Arcade",
        status: "Coming Soon",
        imageText: "BR"
      },
      {
        id: "puzzle-drop",
        title: "Puzzle Drop",
        tinyDescription: "Simple puzzle play",
        shortDescription: "A simple puzzle challenge built for short, relaxing play sessions.",
        genre: "Mini Game",
        status: "Coming Soon",
        imageText: "PD"
      }
    ];

    const params = new URLSearchParams(window.location.search);
    const campaignId = params.get("src") || params.get("campaign") || "direct";

    function withCampaign(path) {
      return path + "?src=" + encodeURIComponent(campaignId);
    }

    function buildGameUrl(gameId) {
      return "game.html?game=" + encodeURIComponent(gameId) + "&src=" + encodeURIComponent(campaignId);
    }

    function renderGames() {
      const hubList = document.getElementById("hubList");
      hubList.innerHTML = games.map((game) => `
        <article class="game-row" data-game-id="${game.id}">
          <div class="row-main" role="link" tabindex="0" aria-label="Open ${game.title}">
            <div class="game-icon" role="img" aria-label="${game.title} icon placeholder">${game.imageText}</div>
            <div>
              <h2 class="game-title">${game.title}</h2>
              <p class="game-short">${game.tinyDescription}</p>
            </div>
            <button class="expand-button" type="button" aria-expanded="false" aria-label="Show more about ${game.title}"><svg class="chevron-icon down" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 8.5L12 15.5L19 8.5"></path></svg></button>
          </div>
          <div class="row-more">
            <div class="row-meta">
              <span class="genre">${game.genre}</span>
              <span aria-hidden="true"> / </span>
              <span class="status">${game.status}</span>
            </div>
            <p>${game.shortDescription}</p>
            <div class="row-note">Tap the game row to open the full page.</div>
          </div>
        </article>
      `).join("");

      hubList.querySelectorAll(".game-row").forEach((row) => {
        const rowMain = row.querySelector(".row-main");
        const button = row.querySelector(".expand-button");
        const gameId = row.getAttribute("data-game-id");

        function openGame() {
          window.location.href = buildGameUrl(gameId);
        }

        rowMain.addEventListener("click", (event) => {
          if (event.target.closest(".expand-button")) return;
          openGame();
        });

        rowMain.addEventListener("keydown", (event) => {
          if (event.key === "Enter") openGame();
        });

        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const expanded = row.classList.toggle("expanded");
          button.setAttribute("aria-expanded", String(expanded));
          button.setAttribute("aria-label", expanded ? "Show less" : "Show more");
          const icon = button.querySelector(".chevron-icon");
          icon.classList.toggle("up", expanded);
        });
      });
    }

    function trackVisit() {
      fetch(feedbackUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          event_type: "visit",
          campaign_id: campaignId,
          page: "games-hub"
        })
      }).catch(() => {});
    }

    function setupNavigation() {
      const menuButton = document.getElementById("menuButton");
      const mobileMenu = document.getElementById("mobileMenu");

      document.getElementById("brandLink").href = withCampaign("index.html");
      document.getElementById("backToHome").href = withCampaign("index.html");
      document.getElementById("navHome").href = withCampaign("index.html");
      document.getElementById("mobileHome").href = withCampaign("index.html");
      document.getElementById("navGames").href = withCampaign("games.html");
      document.getElementById("mobileGames").href = withCampaign("games.html");
      document.getElementById("navAbout").href = withCampaign("index.html") + "#about";
      document.getElementById("mobileAbout").href = withCampaign("index.html") + "#aboutMobile";

      menuButton.addEventListener("click", () => {
        const isOpen = mobileMenu.classList.toggle("open");
        menuButton.setAttribute("aria-expanded", String(isOpen));
      });

      mobileMenu.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          mobileMenu.classList.remove("open");
          menuButton.setAttribute("aria-expanded", "false");
        });
      });
    }

    renderGames();
    trackVisit();
    setupNavigation();
  </script>
</body>
</html>
